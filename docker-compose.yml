services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wardesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wardesk}
      POSTGRES_DB: ${POSTGRES_DB:-wardesk}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - wardesk_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    build:
      context: ./backend
      target: dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      WARDESK_CONTACT: ${WARDESK_CONTACT:-you@example.com}
      INGEST_INTERVAL_SECONDS: ${INGEST_INTERVAL_SECONDS:-45}
      RATE_LIMIT_GUARD: ${RATE_LIMIT_GUARD:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://wardesk:wardesk@db:5432/wardesk}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173"]}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
      target: dev
    depends_on:
      - backend
    environment:
      VITE_BACKEND_ORIGIN: ${VITE_BACKEND_ORIGIN:-http://backend:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      target: prod
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PROD_PORT:-8080}:80"

volumes:
  wardesk_pgdata:
  frontend_node_modules:
